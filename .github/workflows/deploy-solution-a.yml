# .github/workflows/deploy-solution-a.yml

name: Deploy Solution A — S3 + CloudFront

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'environments/*/solution-a/**'
      - 'modules/s3-cloudfront/**'
      - 'modules/acm/**'
      - 'modules/route53/**'
      - 'website/solution-a/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "us-east-1"

jobs:
  setup:
    name: "Setup"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  terraform-deploy:
    name: "Terraform Deploy"
    runs-on: ubuntu-latest
    needs: setup
    environment:
      name: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.setup.outputs.environment == 'prod' && secrets.AWS_ROLE_ARN_PROD || secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-SolA-${{ github.run_id }}
      - name: Terraform Init
        working-directory: environments/${{ needs.setup.outputs.environment }}/solution-a
        run: terraform init -reconfigure
      - name: Terraform Validate
        working-directory: environments/${{ needs.setup.outputs.environment }}/solution-a
        run: terraform validate
      - name: Terraform Plan
        working-directory: environments/${{ needs.setup.outputs.environment }}/solution-a
        run: terraform plan -out=tfplan -no-color
      - name: Terraform Apply
        working-directory: environments/${{ needs.setup.outputs.environment }}/solution-a
        run: terraform apply -auto-approve tfplan

  sync-content:
    name: "Sync Website Content"
    runs-on: ubuntu-latest
    needs: [setup, terraform-deploy]
    environment:
      name: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.setup.outputs.environment == 'prod' && secrets.AWS_ROLE_ARN_PROD || secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Sync-${{ github.run_id }}
      - name: Get Terraform Outputs
        id: tf-outputs
        working-directory: environments/${{ needs.setup.outputs.environment }}/solution-a
        run: |
          terraform init -reconfigure > /dev/null 2>&1
          echo "bucket_id=$(terraform output -raw bucket_id)" >> $GITHUB_OUTPUT
          echo "distribution_id=$(terraform output -raw distribution_id)" >> $GITHUB_OUTPUT
      - name: Sync assets to S3 (long cache)
        run: |
          aws s3 sync website/solution-a/ s3://${{ steps.tf-outputs.outputs.bucket_id }}/ \
            --delete \
            --cache-control "max-age=86400" \
            --exclude "*.html" \
            --region ${{ env.AWS_REGION }}
      - name: Sync HTML to S3 (short cache)
        run: |
          aws s3 sync website/solution-a/ s3://${{ steps.tf-outputs.outputs.bucket_id }}/ \
            --delete \
            --cache-control "max-age=300, must-revalidate" \
            --include "*.html" \
            --region ${{ env.AWS_REGION }}
      - name: Invalidate CloudFront Cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf-outputs.outputs.distribution_id }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "Waiting for invalidation ${INVALIDATION_ID}..."
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ steps.tf-outputs.outputs.distribution_id }} \
            --id ${INVALIDATION_ID}
          echo "✅ Cache invalidated"
      - name: Verify Site
        run: |
          ENV="${{ needs.setup.outputs.environment }}"
          DOMAIN=$([[ "$ENV" == "prod" ]] && echo "quantaweb.dev" || echo "quantadev.dev")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${DOMAIN}" || echo "000")
          echo "https://${DOMAIN} → HTTP ${STATUS}"
